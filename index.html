<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f2af2d" />
    <meta
      name="description"
      content="Reconluz Premia — pontos, ranking e metas da equipe comercial."
    />
    <title>Reconluz Premia</title>
    <script>
      // Claro é o padrão sempre — só aplica escuro antes do primeiro paint se a
      // pessoa já tiver escolhido isso explicitamente (evita flash claro→escuro).
      ;(function () {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
